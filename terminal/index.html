<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RIDDIM POS</title>
  <link rel="stylesheet" href="css/terminal.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ════════════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-brand">RIDDIM</div>
  <div class="login-sub">SUPPER CLUB</div>

  <div class="pin-display">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
  </div>

  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn pin-clear" onclick="pinClear()">CLEAR</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn pin-enter" onclick="attemptLogin()">ENTER</button>
  </div>

  <div id="loginError" class="login-error"></div>
  <div id="loginStation" class="login-station"></div>
  <div id="stationSelector" class="station-selector"></div>
</div>

<!-- ════════════════════════════════════════
     MAIN TERMINAL SCREEN
     ════════════════════════════════════════ -->
<div id="screen-main" class="screen">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-brand">RIDDIM POS</div>
    <div id="topBarStation" class="top-bar-station">Bar 1</div>
    <div class="top-bar-nav">
      <button class="top-nav-btn active" id="navTerminal" onclick="switchView('terminal')">TERMINAL</button>
      <button class="top-nav-btn" id="navManagement" onclick="switchView('management')" style="display:none">MANAGEMENT</button>
    </div>
    <div id="topBarUser" class="top-bar-user"></div>
    <div id="topBarClock" class="top-bar-clock"></div>
    <button class="top-bar-btn danger" onclick="logout()">LOCK</button>
  </div>

  <!-- Main Body: Left (tabs + menu) | Right (cart) -->
  <div class="main-body">

    <!-- Left Panel -->
    <div class="left-panel">

      <!-- Tab Strip -->
      <div id="tabStrip" class="tab-strip"></div>

      <!-- Category Bar -->
      <div id="categoryBar" class="category-bar"></div>

      <!-- Menu Grid -->
      <div id="menuGrid" class="menu-grid"></div>

    </div>

    <!-- Right Panel: Cart -->
    <div class="cart-panel">
      <div class="cart-header">
        <div>
          <div id="cartTabName" class="cart-tab-name">NO TAB</div>
          <div id="cartTabType" class="cart-tab-type"></div>
        </div>
      </div>

      <div id="cartItems" class="cart-items">
        <div class="cart-empty">Tap + to open a tab</div>
      </div>

      <div class="cart-footer">
        <div id="cartTotals" class="cart-totals"></div>
        <div class="cart-actions">
          <button id="btnFire" class="cart-btn fire" onclick="fireOrder()" disabled>FIRE</button>
          <button id="btnPay" class="cart-btn pay" onclick="openPayment()" disabled>PAY</button>
          <button id="btnHold" class="cart-btn hold" onclick="holdTab()" disabled>HOLD</button>
          <button id="btnVoid" class="cart-btn void" onclick="voidTab()" disabled>VOID</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Management Panel (hidden by default, owner/manager only) -->
  <div id="managementPanel" class="mgmt-panel" style="display:none">
    <div class="mgmt-sidebar">
      <button class="mgmt-nav-btn active" data-mgmt="menu" onclick="switchMgmt('menu')">MENU ITEMS</button>
      <button class="mgmt-nav-btn" data-mgmt="categories" onclick="switchMgmt('categories')">CATEGORIES</button>
      <button class="mgmt-nav-btn" data-mgmt="staff" onclick="switchMgmt('staff')">STAFF / PINS</button>
      <button class="mgmt-nav-btn" data-mgmt="stations" onclick="switchMgmt('stations')">STATIONS</button>
      <button class="mgmt-nav-btn" data-mgmt="settings" onclick="switchMgmt('settings')">POS SETTINGS</button>
      <button class="mgmt-nav-btn" data-mgmt="dayclose" onclick="switchMgmt('dayclose')">CLOSE DAY</button>
    </div>
    <div class="mgmt-content">

      <!-- MENU ITEMS -->
      <div id="mgmt-menu" class="mgmt-section active">
        <div class="mgmt-header">
          <h2 class="mgmt-title">MENU ITEMS</h2>
          <button class="mgmt-action-btn" onclick="openAddItemModal()">+ ADD ITEM</button>
        </div>
        <div class="mgmt-filter">
          <select id="mgmtMenuFilter" onchange="renderMgmtMenu()">
            <option value="all">All Categories</option>
          </select>
          <input type="text" id="mgmtMenuSearch" placeholder="Search items..." oninput="renderMgmtMenu()">
        </div>
        <div id="mgmtMenuList" class="mgmt-table-wrap"></div>
      </div>

      <!-- CATEGORIES -->
      <div id="mgmt-categories" class="mgmt-section">
        <div class="mgmt-header">
          <h2 class="mgmt-title">CATEGORIES</h2>
          <button class="mgmt-action-btn" onclick="openAddCategoryModal()">+ ADD CATEGORY</button>
        </div>
        <div id="mgmtCategoryList" class="mgmt-table-wrap"></div>
      </div>

      <!-- STAFF / PINS -->
      <div id="mgmt-staff" class="mgmt-section">
        <div class="mgmt-header">
          <h2 class="mgmt-title">STAFF / PINS</h2>
        </div>
        <div id="mgmtStaffList" class="mgmt-table-wrap"></div>
      </div>

      <!-- STATIONS -->
      <div id="mgmt-stations" class="mgmt-section">
        <div class="mgmt-header">
          <h2 class="mgmt-title">STATIONS</h2>
        </div>
        <div id="mgmtStationList" class="mgmt-table-wrap"></div>
      </div>

      <!-- POS SETTINGS -->
      <div id="mgmt-settings" class="mgmt-section">
        <div class="mgmt-header">
          <h2 class="mgmt-title">POS SETTINGS</h2>
        </div>
        <div id="mgmtSettings" class="mgmt-form"></div>
      </div>

      <!-- CLOSE DAY -->
      <div id="mgmt-dayclose" class="mgmt-section">
        <div class="mgmt-header">
          <h2 class="mgmt-title">CLOSE DAY</h2>
        </div>
        <div id="mgmtDayClose" class="mgmt-form"></div>
      </div>

    </div>
  </div>

</div>

<!-- ════════════════════════════════════════
     PAYMENT MODAL
     ════════════════════════════════════════ -->
<div id="paymentModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">PAYMENT</div>
      <button class="modal-close" onclick="closeModal('paymentModal')">X</button>
    </div>
    <div class="modal-body">
      <div class="pay-amount">
        <div class="pay-amount-label">TOTAL DUE</div>
        <div id="payAmountValue" class="pay-amount-value">$0.00</div>
      </div>

      <div class="pay-methods">
        <button class="pay-method-btn card selected" data-method="card" onclick="selectPayMethod('card')">CARD</button>
        <button class="pay-method-btn cash" data-method="cash" onclick="selectPayMethod('cash')">CASH</button>
        <button class="pay-method-btn comp" data-method="comp" onclick="selectPayMethod('comp')">COMP</button>
        <button class="pay-method-btn split" data-method="split" onclick="selectPayMethod('split')">SPLIT</button>
      </div>

      <div class="pay-tip">
        <div class="pay-tip-label">TIP</div>
        <div class="pay-tip-options">
          <button class="tip-btn" data-tip="0" onclick="selectTip(0)">No Tip</button>
          <button class="tip-btn" data-tip="0.18" onclick="selectTip(0.18)">18%</button>
          <button class="tip-btn selected" data-tip="0.20" onclick="selectTip(0.20)">20%</button>
          <button class="tip-btn" data-tip="0.25" onclick="selectTip(0.25)">25%</button>
        </div>
      </div>

      <button class="pay-submit" onclick="submitPayment()">CLOSE TAB</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     NEW TAB MODAL
     ════════════════════════════════════════ -->
<div id="newTabModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">NEW TAB</div>
      <button class="modal-close" onclick="closeModal('newTabModal')">X</button>
    </div>
    <div class="modal-body">
      <div class="new-tab-options">
        <input id="newTabName" class="new-tab-input" type="text"
               placeholder="Guest name (optional)"
               onkeydown="if(event.key==='Enter') createNamedTab()">

        <div class="new-tab-quick">
          <button class="quick-tab-btn" onclick="createQuickTab('bar')">BAR TAB</button>
          <button class="quick-tab-btn" onclick="createQuickTab('walkin')">WALK-IN</button>
          <button class="quick-tab-btn" onclick="createQuickTab('member')">MEMBER</button>
          <button class="quick-tab-btn" onclick="createQuickTab('table')">TABLE</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     EDIT ITEM MODAL
     ════════════════════════════════════════ -->
<div id="editItemModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editItemTitle">ADD ITEM</div>
      <button class="modal-close" onclick="closeModal('editItemModal')">X</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editItemId">
      <div class="form-row">
        <label class="form-label">NAME</label>
        <input type="text" id="editItemName" class="form-input" placeholder="Item name">
      </div>
      <div class="form-row">
        <label class="form-label">PRICE</label>
        <input type="number" id="editItemPrice" class="form-input" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="form-row">
        <label class="form-label">CATEGORY</label>
        <select id="editItemCategory" class="form-input"></select>
      </div>
      <div class="form-row">
        <label class="form-label">SPEED RAIL</label>
        <label class="form-toggle"><input type="checkbox" id="editItemSpeedRail"><span class="toggle-track"></span></label>
      </div>
      <div class="form-row">
        <label class="form-label">SORT ORDER</label>
        <input type="number" id="editItemSort" class="form-input" min="0" value="0">
      </div>
      <div class="form-actions">
        <button class="mgmt-action-btn danger" id="editItemDeleteBtn" onclick="deleteMenuItem()" style="display:none">DELETE</button>
        <button class="mgmt-action-btn" onclick="saveMenuItem()">SAVE</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     ADD CATEGORY MODAL
     ════════════════════════════════════════ -->
<div id="editCategoryModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editCatTitle">ADD CATEGORY</div>
      <button class="modal-close" onclick="closeModal('editCategoryModal')">X</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCatId">
      <div class="form-row">
        <label class="form-label">NAME</label>
        <input type="text" id="editCatName" class="form-input" placeholder="Category name">
      </div>
      <div class="form-row">
        <label class="form-label">COLOR (optional)</label>
        <input type="text" id="editCatColor" class="form-input" placeholder="#D4A843">
      </div>
      <div class="form-row">
        <label class="form-label">SORT ORDER</label>
        <input type="number" id="editCatSort" class="form-input" min="0" value="0">
      </div>
      <div class="form-actions">
        <button class="mgmt-action-btn" onclick="saveCategory()">SAVE</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     EDIT STAFF MODAL
     ════════════════════════════════════════ -->
<div id="editStaffModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">EDIT STAFF PIN</div>
      <button class="modal-close" onclick="closeModal('editStaffModal')">X</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editStaffId">
      <div class="form-row">
        <label class="form-label">NAME</label>
        <div id="editStaffName" class="form-static"></div>
      </div>
      <div class="form-row">
        <label class="form-label">POS PIN (4 digits)</label>
        <input type="text" id="editStaffPin" class="form-input" maxlength="4" pattern="\d{4}" placeholder="1234">
      </div>
      <div class="form-row">
        <label class="form-label">POS ROLE</label>
        <select id="editStaffRole" class="form-input">
          <option value="">-- No POS Access --</option>
          <option value="owner">Owner</option>
          <option value="manager">Manager</option>
          <option value="bartender">Bartender</option>
          <option value="barback">Barback</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="mgmt-action-btn" onclick="saveStaffPin()">SAVE</button>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/management.js"></script>
</body>
</html>
